<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变：黄铜色到金色 -->
    <linearGradient id="brassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B"/>
      <stop offset="50%" style="stop-color:#D4A017"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <!-- 内部高光渐变 -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1a1a1a" flood-opacity="0.4"/>
    </filter>
    <!-- 内发光滤镜 -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000" flood-opacity="0.3" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- 背景圆：羊皮纸色 -->
  <circle cx="256" cy="256" r="240" fill="#F4EEDF" stroke="url(#brassGradient)" stroke-width="8"/>

  <!-- 装饰性内圈 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#D4A017" stroke-width="2" opacity="0.6"/>

  <!-- 主字母 W：锻造风格 -->
  <g filter="url(#dropShadow)">
    <!-- W 主体 -->
    <path d="
      M 120 140
      L 180 380
      L 256 260
      L 332 380
      L 392 140
      L 340 140
      L 298 300
      L 256 200
      L 214 300
      L 172 140
      Z
    " fill="url(#brassGradient)" stroke="#8B6914" stroke-width="4" filter="url(#innerShadow)"/>

    <!-- W 高光边缘 -->
    <path d="
      M 120 140
      L 180 380
      L 256 260
      L 332 380
      L 392 140
      L 340 140
      L 298 300
      L 256 200
      L 214 300
      L 172 140
      Z
    " fill="none" stroke="url(#innerGlow)" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- 锻造火花装饰 -->
  <g fill="#FFD700" opacity="0.8">
    <circle cx="100" cy="120" r="4"/>
    <circle cx="412" cy="120" r="4"/>
    <circle cx="90" cy="140" r="2"/>
    <circle cx="422" cy="140" r="2"/>
  </g>

  <!-- 铁砧底座装饰线 -->
  <path d="M 160 400 L 352 400" stroke="url(#brassGradient)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 180 410 L 332 410" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>

  <!-- 底部文字：FORGE -->
  <text x="256" y="450" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="url(#brassGradient)" letter-spacing="8">FORGE</text>
</svg>