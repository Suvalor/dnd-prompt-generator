server {
    # HTTPS is terminated by Cloudflare. HTTP→HTTPS redirect is handled by
    # Cloudflare "Always Use HTTPS" feature. This Nginx instance only listens
    # on port 80 behind Cloudflare's proxy.

    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API 反向代理到后端服务
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 45s;
        proxy_connect_timeout 5s;
    }

    # robots.txt 和 sitemap.xml 不缓存
    location = /robots.txt {
        default_type text/plain;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /sitemap.xml =404;
    }

    # Clean URL 路由：将 /about 等映射到 /pages/about.html
    location = /about {
        try_files /pages/about.html =404;
    }
    location = /privacy {
        try_files /pages/privacy.html =404;
    }
    location = /terms {
        try_files /pages/terms.html =404;
    }
    location = /contact {
        try_files /pages/contact.html =404;
    }
    location = /excel-ratio-converter {
        try_files /pages/excel-ratio-converter.html =404;
    }

    # Guide page clean URLs
    location = /character-portrait-guide {
        try_files /pages/character-portrait-guide.html =404;
    }
    location = /full-body-guide {
        try_files /pages/full-body-guide.html =404;
    }
    location = /token-guide {
        try_files /pages/token-guide.html =404;
    }
    location = /monster-guide {
        try_files /pages/monster-guide.html =404;
    }
    location = /npc-guide {
        try_files /pages/npc-guide.html =404;
    }
    location = /scene-guide {
        try_files /pages/scene-guide.html =404;
    }

    # Trailing slash -> canonical (no trailing slash)
    location = /about/ {
        return 301 /about;
    }
    location = /privacy/ {
        return 301 /privacy;
    }
    location = /terms/ {
        return 301 /terms;
    }
    location = /contact/ {
        return 301 /contact;
    }
    location = /excel-ratio-converter/ {
        return 301 /excel-ratio-converter;
    }

    # Guide page trailing slash 301
    location = /character-portrait-guide/ {
        return 301 /character-portrait-guide;
    }
    location = /full-body-guide/ {
        return 301 /full-body-guide;
    }
    location = /token-guide/ {
        return 301 /token-guide;
    }
    location = /monster-guide/ {
        return 301 /monster-guide;
    }
    location = /npc-guide/ {
        return 301 /npc-guide;
    }
    location = /scene-guide/ {
        return 301 /scene-guide;
    }

    # 301 重定向：/pages/*.html -> clean URL
    location = /pages/about.html {
        return 301 /about;
    }
    location = /pages/privacy.html {
        return 301 /privacy;
    }
    location = /pages/terms.html {
        return 301 /terms;
    }
    location = /pages/contact.html {
        return 301 /contact;
    }
    location = /pages/excel-ratio-converter.html {
        return 301 /excel-ratio-converter;
    }

    # Guide page /pages/*.html 301 redirect
    location = /pages/character-portrait-guide.html {
        return 301 /character-portrait-guide;
    }
    location = /pages/full-body-guide.html {
        return 301 /full-body-guide;
    }
    location = /pages/token-guide.html {
        return 301 /token-guide;
    }
    location = /pages/monster-guide.html {
        return 301 /monster-guide;
    }
    location = /pages/npc-guide.html {
        return 301 /npc-guide;
    }
    location = /pages/scene-guide.html {
        return 301 /scene-guide;
    }

    # /index.html 301 重定向到 /
    location = /index.html {
        return 301 /;
    }

    # 静态资源缓存
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # 默认路由：使用命名 location 避免 SPA fallback 触发上面的 = /index.html 重定向
    location / {
        try_files $uri @spa;
    }

    # SPA fallback：内部跳转，rewrite + break 不重新匹配 location，不触发 = /index.html
    location @spa {
        internal;
        root /usr/share/nginx/html;
        rewrite ^ /index.html break;
    }
}
