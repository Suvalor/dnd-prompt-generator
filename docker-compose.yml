services:
  backend:
    build:
      context: ./dnd-prompt-forge
      dockerfile: backend/Dockerfile
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DB_PATH: ${DB_PATH:-/app/data/prompt_forge.db}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    volumes:
      - backend-data:/app/data
    ports:
      - "${BACKEND_PORT:-8002}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./dnd-prompt-forge
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  backend-data:
