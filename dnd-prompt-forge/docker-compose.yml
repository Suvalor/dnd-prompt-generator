services:
  nginx:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      MIMO_BASE_URL: ${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      MIMO_MODEL: ${MIMO_MODEL:-mimo-v2.5}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_QUOTA_LIMIT: ${LLM_QUOTA_LIMIT:-10}
      SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET:-}
      CSRF_SECRET: ${CSRF_SECRET:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DB_PATH: ${DB_PATH:-/app/data/prompt_forge.db}
    volumes:
      - backend-data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  backend-data:
