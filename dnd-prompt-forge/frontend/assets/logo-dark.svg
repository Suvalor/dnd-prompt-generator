<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A017"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
  </defs>

  <!-- 透明背景，仅 W 字母 -->
  <g>
    <!-- W 主体 -->
    <path d="
      M 120 140
      L 180 380
      L 256 260
      L 332 380
      L 392 140
      L 340 140
      L 298 300
      L 256 200
      L 214 300
      L 172 140
      Z
    " fill="url(#brassGradient)" stroke="#FFD700" stroke-width="4"/>

    <!-- W 高光边缘 -->
    <path d="
      M 120 140
      L 180 380
      L 256 260
      L 332 380
      L 392 140
      L 340 140
      L 298 300
      L 256 200
      L 214 300
      L 172 140
      Z
    " fill="none" stroke="url(#innerGlow)" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- 锻造火花装饰 -->
  <g fill="#FFD700" opacity="0.9">
    <circle cx="100" cy="120" r="5"/>
    <circle cx="412" cy="120" r="5"/>
    <circle cx="88" cy="142" r="3"/>
    <circle cx="424" cy="142" r="3"/>
  </g>

  <!-- 铁砧底座 -->
  <path d="M 160 400 L 352 400" stroke="url(#brassGradient)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 180 410 L 332 410" stroke="#B8860B" stroke-width="3" stroke-linecap="round"/>
</svg>