<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810"/>
      <stop offset="100%" style="stop-color:#1A0F0A"/>
    </linearGradient>
    <linearGradient id="brassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#D4A017"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="parchmentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4EEDF"/>
      <stop offset="100%" style="stop-color:#E8DFC8"/>
    </linearGradient>
  </defs>

  <!-- 深色背景 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 装饰性边框 -->
  <rect x="20" y="20" width="1160" height="590" rx="8" fill="none" stroke="#D4A017" stroke-width="2" opacity="0.4"/>
  <rect x="30" y="30" width="1140" height="570" rx="6" fill="none" stroke="#D4A017" stroke-width="1" opacity="0.2"/>

  <!-- 左侧 W Logo -->
  <g transform="translate(80, 115) scale(0.8)">
    <path d="M 120 140 L 180 380 L 256 260 L 332 380 L 392 140 L 340 140 L 298 300 L 256 200 L 214 300 L 172 140 Z"
          fill="url(#brassGrad)" stroke="#FFD700" stroke-width="4"/>
    <path d="M 160 400 L 352 400" stroke="url(#brassGrad)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 180 410 L 332 410" stroke="#B8860B" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 右侧文字区域 -->
  <text x="520" y="200" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="url(#parchmentGrad)">
    DND Prompt
  </text>
  <text x="520" y="290" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="url(#brassGrad)">
    Forge
  </text>

  <!-- 副标题 -->
  <text x="520" y="360" font-family="Arial, sans-serif" font-size="28" fill="#D4A017" opacity="0.9">
    Free AI Image Prompt Generator
  </text>

  <!-- 底部特性标签 -->
  <g transform="translate(520, 420)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="none" stroke="#D4A017" stroke-width="1.5" opacity="0.6"/>
    <text x="70" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#F4EEDF" opacity="0.9">No Login</text>

    <rect x="160" y="0" width="140" height="36" rx="18" fill="none" stroke="#D4A017" stroke-width="1.5" opacity="0.6"/>
    <text x="230" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#F4EEDF" opacity="0.9">Free Forever</text>

    <rect x="320" y="0" width="180" height="36" rx="18" fill="none" stroke="#D4A017" stroke-width="1.5" opacity="0.6"/>
    <text x="410" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#F4EEDF" opacity="0.9">All AI Models</text>
  </g>

  <!-- 底部 URL -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#D4A017" opacity="0.5">
    dndpromptforge.com
  </text>
</svg>